{{- /*
  Service unique fourni pour démarrer.
  notif reste volontairement en Deployment classique dans le poly (cf. étape 5)
  pour comparer le geste avec les services migrés en Rollout. Vous N'AVEZ DONC
  PAS à ajouter de service-stable / service-canary ici, sauf si vous migrez
  notif en Rollout par choix.
  Le label `release` est requis pour que le ServiceMonitor du
  kube-prometheus-stack le découvre (cf. étape 4).
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "notif.fullname" . }}
  labels:
    {{- include "notif.labels" . | nindent 4 }}
    {{- if .Values.monitoring.enabled }}
    release: {{ .Values.monitoring.serviceMonitor.release | quote }}
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "notif.selectorLabels" . | nindent 4 }}
