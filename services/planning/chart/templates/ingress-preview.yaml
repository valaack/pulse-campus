{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "planning.fullname" . }}-preview
  labels:
    {{- include "planning.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: "planning-preview.devhub.local"
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "planning.fullname" . }}-preview
                port:
                  number: {{ .Values.service.port }}
{{- end }}
