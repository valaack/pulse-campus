# Surcharges pour l'environnement de développement (namespace devhub-dev).
# Ne mettez ICI que ce qui diffère de values.yaml.

ingress:
  enabled: true
  host: annuaire.devhub.local

env:
  LOG_LEVEL: debug
  FAIL_RATE: "0.5"

# En étape 4 vous activerez le ServiceMonitor :
monitoring:
  enabled: true

image:
  repository: ghcr.io/valaack/annuaire
  tag: "3639584"
  pullPolicy: IfNotPresent
