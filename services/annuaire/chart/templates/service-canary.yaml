apiVersion: v1
kind: Service
metadata:
  name: {{ include "annuaire.fullname" . }}-canary
  labels:
    {{- include "annuaire.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "annuaire.selectorLabels" . | nindent 4 }}
